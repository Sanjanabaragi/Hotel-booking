<nav class="d-flex justify-content-center mt-4">

  <ul class="pagination">

    <li class="page-item">

      <button class="page-link"
              (click)="previousPage()">
        Previous
      </button>

    </li>

    <li class="page-item active">

      <span class="page-link">
        {{ currentPage }}
      </span>

    </li>

    <li class="page-item">

      <button class="page-link"
              (click)="nextPage()">
        Next
      </button>

    </li>

  </ul>

</nav>
