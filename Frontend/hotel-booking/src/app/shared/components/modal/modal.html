<div *ngIf="isOpen"
     class="modal fade show d-block"
     tabindex="-1">

  <div class="modal-dialog">

    <div class="modal-content">

      <div class="modal-header">

        <h5 class="modal-title">
          {{ title }}
        </h5>

        <button type="button"
                class="btn-close"
                (click)="closeModal()">
        </button>

      </div>

      <div class="modal-body">

        <ng-content></ng-content>

      </div>

    </div>

  </div>

</div>
