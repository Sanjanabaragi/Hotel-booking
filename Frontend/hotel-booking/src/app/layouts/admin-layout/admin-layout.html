<div class="admin-layout">

  <!-- Sidebar -->
  <div
    class="sidebar bg-dark text-white"
    [class.collapsed]="sidebarCollapsed">

    <div class="p-3">

      <h4 class="fw-bold">
        Admin Panel
      </h4>

      <ul class="nav flex-column mt-4">

        <li class="nav-item mb-2">
          <a
            routerLink="/admin/dashboard"
            class="nav-link text-white">

            Dashboard

          </a>
        </li>

        <li class="nav-item mb-2">
          <a
            routerLink="/admin/manage-hotels"
            class="nav-link text-white">

            Hotels

          </a>
        </li>

        <li class="nav-item mb-2">
          <a
            routerLink="/admin/manage-rooms"
            class="nav-link text-white">

            Rooms

          </a>
        </li>

        <li class="nav-item mb-2">
          <a
            routerLink="/admin/bookings"
            class="nav-link text-white">

            Bookings

          </a>
        </li>

        <li class="nav-item mb-2">
          <a
            routerLink="/admin/reports"
            class="nav-link text-white">

            Reports

          </a>
        </li>

      </ul>

    </div>

  </div>


  <!-- Main Content -->
  <div class="content-area">

    <!-- Top Navbar -->
    <nav
      class="navbar navbar-light bg-light shadow-sm px-3">

      <button
        class="btn btn-outline-dark"
        (click)="toggleSidebar()">

        ☰

      </button>

      <h5 class="mb-0">
        Hotel Booking Admin
      </h5>

    </nav>


    <!-- Page Content -->
    <div class="p-4">

      <router-outlet></router-outlet>

    </div>

  </div>

</div>
