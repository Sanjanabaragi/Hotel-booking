<div class="auth-container">
  <div class="auth-card">
    <h2>Reset Password</h2>
    <p class="subtitle">Enter your email and we'll send you a secure link to reset your password</p>

    <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()">
      <div *ngIf="errorMessage" class="alert error">{{ errorMessage }}</div>
      <div *ngIf="successMessage" class="alert success">{{ successMessage }}</div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input id="email" type="email" formControlName="email" placeholder="name@example.com" />
        <span class="error-text" *ngIf="forgotForm.get('email')?.touched && forgotForm.get('email')?.invalid">
          Please enter a valid email address.
        </span>
      </div>

      <button type="submit" [disabled]="forgotForm.invalid || loading" class="btn-primary">
        {{ loading ? 'Sending Link...' : 'Send Reset Link' }}
      </button>
    </form>

    <div class="auth-footer">
      <p>Back to <a routerLink="/auth/login">Log In</a></p>
    </div>
  </div>
</div>
